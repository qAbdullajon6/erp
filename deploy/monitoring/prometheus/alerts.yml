# Alert rules over signals that exist today (host, container, Postgres, Redis
# exporters). Application-level alerts (error rate, queue backlog, cron failure)
# are added when the API /metrics endpoint lands — see prometheus.yml.
groups:
  - name: availability
    rules:
      - alert: TargetDown
        expr: up == 0
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "{{ $labels.instance }} ({{ $labels.job }}) has been unreachable for 2m."

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "postgres-exporter cannot connect to the database. The API is almost certainly failing readiness."

      - alert: RedisDown
        expr: redis_up == 0
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: "Redis is unreachable"
          description: "Rate-limit counters fall back to per-process memory until Redis returns — limits loosen with instance count."

  - name: saturation
    rules:
      - alert: HostLowDisk
        expr: (node_filesystem_avail_bytes{mountpoint="/host"} / node_filesystem_size_bytes{mountpoint="/host"}) < 0.10
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "Disk under 10% free"
          description: "The VPS root filesystem is nearly full. Postgres writes and backups fail when the disk fills."

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Host memory over 90%"
          description: "Sustained memory pressure — a `docker compose build` on this box can OOM (see deploy/README.md sizing)."

      - alert: PostgresConnectionsHigh
        expr: sum(pg_stat_activity_count) > (pg_settings_max_connections * 0.85)
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "PostgreSQL connections over 85% of max"
          description: "Approaching max_connections; new API requests will start failing to acquire a connection."

  - name: backups
    rules:
      # Requires a backup that writes a Prometheus textfile/pushgateway metric.
      # Left here as the intended shape; wire it when the backup emits a
      # last-success timestamp. Fires when no successful dump in ~26h.
