name: Deploy (production)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "git ref checked out on the VPS"
        required: true
        default: main
      reason:
        description: "Why this deploy is happening (recorded in the run)"
        required: false
        default: ""
      api_image:
        description: "Optional prebuilt API image (e.g. ghcr.io/owner/erp-api:v1.2.3). Leave empty to build on the VPS."
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    env:
      HAS_SLACK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

    steps:
      - name: Resolve ref
        id: cfg
        env:
          OWNER: ${{ github.repository_owner }}
          EVENT: ${{ github.event_name }}
          IN_REF: ${{ github.event.inputs.ref }}
          IN_IMAGE: ${{ github.event.inputs.api_image }}
          REL_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT" = "release" ]; then
            REF="$REL_TAG"
            IMAGE="ghcr.io/${OWNER,,}/erp-api:${REL_TAG}"
          elif [ "$EVENT" = "push" ]; then
            REF="$GITHUB_REF_NAME"
            IMAGE=""
          else
            REF="$IN_REF"
            IMAGE="$IN_IMAGE"
          fi

          {
            echo "deploy_ref=$REF"
            echo "api_image=$IMAGE"
          } >> "$GITHUB_OUTPUT"

          echo "Deploying ref=$REF image=${IMAGE:-build-on-vps}"

      - name: Preflight — SSH secrets check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          fail=0

          [ -n "$VPS_HOST" ] || {
            echo "::error::VPS_HOST missing"
            fail=1
          }

          [ -n "$VPS_USER" ] || {
            echo "::error::VPS_USER missing"
            fail=1
          }

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY missing"
            fail=1
          else
            case "$VPS_SSH_KEY" in
              *"PRIVATE KEY"*) ;;
              *)
                echo "::error::SSH key is not private key"
                fail=1
                ;;
            esac
          fi

          exit "$fail"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}

          command_timeout: 20m
          script_stop: true

          envs: DEPLOY_REF,API_IMAGE

          script: |
            set -Eeuo pipefail

            cd /opt/flowerp

            echo "==> Sync repository"

            git fetch --all --tags --prune --force

            git checkout -f "${DEPLOY_REF}"

            if git show-ref --verify --quiet "refs/remotes/origin/${DEPLOY_REF}"; then
              git reset --hard "origin/${DEPLOY_REF}"
            else
              git reset --hard "${DEPLOY_REF}"
            fi

            git submodule update --init --recursive

            echo "==> Repository state"
            pwd
            git rev-parse HEAD

            echo "==> Fix permissions"
            chmod +x \
              scripts/deploy.sh \
              scripts/rollback.sh \
              scripts/lib.sh

            if [ -n "${API_IMAGE:-}" ]; then
              export API_IMAGE
              echo "==> deploying with prebuilt image $API_IMAGE (ref ${DEPLOY_REF})"
            else
              unset API_IMAGE || true
              echo "==> deploying with local build (ref ${DEPLOY_REF})"
            fi

            ./scripts/deploy.sh "${DEPLOY_REF}"

        env:
          DEPLOY_REF: ${{ steps.cfg.outputs.deploy_ref }}
          API_IMAGE: ${{ steps.cfg.outputs.api_image }}

      - name: Notify on failure
        if: failure() && env.HAS_SLACK == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sf \
          -X POST \
          -H 'Content-type: application/json' \
          --data "{\"text\":\":rotating_light: FlowERP production deploy FAILED for \`${{ steps.cfg.outputs.deploy_ref }}\`\"}" \
          "$SLACK_WEBHOOK_URL"
