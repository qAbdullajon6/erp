name: Deploy (production)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy (e.g. v1.2.3, or a hotfix tag)"
        required: true
        default: latest
      ref:
        description: "git ref checked out on the VPS for scripts/compose"
        required: true
        default: main
      reason:
        description: "Why this deploy is happening (recorded in the run)"
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production

    env:
      HAS_SLACK: ${{ secrets.SLACK_WEBHOOK_URL != '' }}

    steps:
      - name: Resolve tag & ref
        id: cfg
        env:
          OWNER: ${{ github.repository_owner }}
          EVENT: ${{ github.event_name }}
          IN_TAG: ${{ github.event.inputs.image_tag }}
          IN_REF: ${{ github.event.inputs.ref }}
          REL_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT" = "release" ]; then
            TAG="$REL_TAG"
            REF="$REL_TAG"
          else
            TAG="$IN_TAG"
            REF="$IN_REF"
          fi

          {
            echo "image_repo=ghcr.io/${OWNER,,}/erp-api"
            echo "image_tag=$TAG"
            echo "deploy_ref=$REF"
          } >> "$GITHUB_OUTPUT"

          echo "Deploying ghcr.io/${OWNER,,}/erp-api:$TAG (ref $REF)"

      - name: Preflight — SSH secrets check
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          fail=0

          [ -n "$VPS_HOST" ] || {
            echo "::error::VPS_HOST missing"
            fail=1
          }

          [ -n "$VPS_USER" ] || {
            echo "::error::VPS_USER missing"
            fail=1
          }

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::VPS_SSH_KEY missing"
            fail=1
          else
            case "$VPS_SSH_KEY" in
              *"PRIVATE KEY"*) ;;
              *)
                echo "::error::SSH key is not private key"
                fail=1
                ;;
            esac
          fi

          exit "$fail"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}

          command_timeout: 20m
          script_stop: true

          envs: IMAGE_REPO,IMAGE_TAG,DEPLOY_REF

          script: |
            set -Eeuo pipefail

            cd /opt/flowerp

            echo "==> Sync repository"

            git fetch --all --tags --prune --force

            git checkout -f "${DEPLOY_REF}"

            if git show-ref --verify --quiet "refs/remotes/origin/${DEPLOY_REF}"; then
              git reset --hard "origin/${DEPLOY_REF}"
            else
              git reset --hard "${DEPLOY_REF}"
            fi

            git submodule update --init --recursive


            echo "==> Repository state"

            pwd
            git rev-parse HEAD
            ls -la
            ls -la scripts


            echo "==> Fix permissions"

            chmod +x \
              scripts/deploy.sh \
              scripts/rollback.sh \
              scripts/lib.sh


            export API_IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"


            echo "==> deploying $API_IMAGE (ref ${DEPLOY_REF})"


            ./scripts/deploy.sh "${DEPLOY_REF}"


        env:
          IMAGE_REPO: ${{ steps.cfg.outputs.image_repo }}
          IMAGE_TAG: ${{ steps.cfg.outputs.image_tag }}
          DEPLOY_REF: ${{ steps.cfg.outputs.deploy_ref }}


      - name: Notify on failure
        if: failure() && env.HAS_SLACK == 'true'

        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

        run: |
          curl -sf \
          -X POST \
          -H 'Content-type: application/json' \
          --data "{\"text\":\":rotating_light: FlowERP production deploy FAILED for \`${{ steps.cfg.outputs.image_tag }}\`\"}" \
          "$SLACK_WEBHOOK_URL"