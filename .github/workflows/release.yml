name: Release

# Cutting a release = pushing a semver tag (v1.2.3). This builds the API image
# ONCE, pushes it to GHCR, and creates a GitHub Release. The VPS later PULLS that
# exact image (deploy.yml) — it never rebuilds, so what ships is bit-identical to
# what was tagged. The frontend is not built here: it is on Vercel (see
# DEPLOYMENT_PIPELINE.md → Vercel).
on:
  push:
    tags: ["v*.*.*"]
  # Manual trigger: makes Release appear in the Actions UI with a "Run workflow"
  # button and lets it publish the image on demand — without cutting a version
  # tag. (The button only shows when this workflow is on the DEFAULT branch.)
  workflow_dispatch: {}

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  build-push-api:
    name: Build & push API image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the owner login may not be.
      - name: Compute lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/erp-api" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            # Always publish :latest so the Deploy workflow's default
            # image_tag=latest resolves. A fresh GHCR package has no :latest
            # until something publishes it, which is the "not found" failure.
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: build-push-api
    # Only a real version-tag push has a tag to release; a manual dispatch does
    # not, so this job is skipped there (the image still gets built and pushed).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff from the last tag
      - name: Create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Automated release for `${{ github.ref_name }}`.

            The API image is published to GHCR and deployable via the
            **Deploy (production)** workflow, or automatically on publish if the
            environment approval is granted. See RELEASE_PROCESS.md.
