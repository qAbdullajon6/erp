# Staging stack for a single VPS: PostgreSQL, Redis, the NestJS API, the SSR
# frontend, and Caddy in front of both.
#
#   cp deploy/.env.staging.example .env.staging   # fill in real secrets
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build
#
# Only Caddy publishes ports. Postgres and Redis are reachable on the compose
# network and nowhere else — a database port open to the internet is how staging
# databases get emptied.
#
# The API container runs `prisma migrate deploy` on start (never `migrate dev`,
# which offers to reset the database).
#
# The project name is pinned. Without it Compose derives it from the directory,
# which is the same directory docker-compose.yml (the development Postgres) uses
# — so bringing this stack up replaced the development database container with a
# staging one, and `down` then deleted it.
name: flowerp-staging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-erp_staging}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      # Where scripts/backup-postgres.sh writes its dumps.
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-erp_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persistence is off on purpose: Redis only holds rate-limit counters here.
    # Losing them on restart costs one minute of throttling, not data.
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # API_IMAGE lets a deploy PULL a prebuilt image (CI built it and pushed it to
    # GHCR) instead of building on the box. Unset, it falls back to this local tag
    # and the `build:` below runs — the original single-VPS behaviour, unchanged.
    # deploy.sh chooses pull vs. build from whether API_IMAGE is set.
    image: ${API_IMAGE:-flowerp-staging-api:local}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_staging}?schema=public
      REDIS_URL: redis://redis:6379
      # Same-origin deployment: the browser only ever calls the site's own
      # /api/*, which Caddy strips and forwards. CORS never comes into play, but
      # the value is kept honest in case the API is ever exposed directly.
      CORS_ORIGIN: ${PUBLIC_ORIGIN:?PUBLIC_ORIGIN is required, e.g. https://staging.flow-erp.uz}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_ACCESS_EXPIRES_IN_SECONDS: ${JWT_ACCESS_EXPIRES_IN_SECONDS:-900}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
      # Frontend origin the invite link points at (the Vercel origin the browser
      # loads). NODE_ENV is production here, so the API requires it to boot.
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:?APP_PUBLIC_URL is required, e.g. https://staging.flowerp.uz}
      INVITATION_EXPIRES_IN_DAYS: ${INVITATION_EXPIRES_IN_DAYS:-7}
      # Optional: empty means no SMTP transport, so the mail layer logs the link.
      SMTP_URL: ${SMTP_URL:-}
      MAIL_FROM: ${MAIL_FROM:-}
    expose:
      - "4000"

  # Not started by default: the frontend is deployed to Vercel, and the VPS
  # serves the API alone. This service exists so the whole stack — SSR frontend
  # included — can be rehearsed locally on one origin, which is how Vercel's
  # rewrite makes it look to the browser anyway.
  #
  #   CADDYFILE=./deploy/Caddyfile.local docker compose \
  #     -f docker-compose.staging.yml --env-file .env.staging --profile web up -d
  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
    expose:
      - "3000"

  # Only runs when asked for by name — see `profiles`. The runtime API image is
  # built with `--omit=dev`, so it has no ts-node and cannot run the seeds; this
  # stops at the Dockerfile's `build` stage, which does.
  #
  #   docker compose -f docker-compose.staging.yml --env-file .env.staging \
  #     run --rm seeder npx ts-node prisma/seed-test-org.ts
  #
  # The seeds create accounts with a password that is published in the README.
  # Never run them against production.
  seeder:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: build
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /repo/apps/api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_staging}?schema=public
    entrypoint: ["sh", "-c"]
    command: ["echo 'pass a command, e.g. npx ts-node prisma/seed-test-org.ts'"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # `:8080` locally; `api.staging.flow-erp.uz` on the VPS, where Caddy then
      # obtains and renews the certificate itself.
      SITE_ADDRESS: ${SITE_ADDRESS:-:8080}
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      # deploy/Caddyfile serves the API alone (the VPS's job). Point CADDYFILE
      # at deploy/Caddyfile.local to also serve the SSR frontend on one origin
      # for a local rehearsal.
      - ${CADDYFILE:-./deploy/Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_staging_data:
  caddy_data:
  caddy_config:
