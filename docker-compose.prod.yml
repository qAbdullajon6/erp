# SUPERSEDED by docker-compose.staging.yml — see deploy/README.md.
#
# This file predates the move off Vercel. It has three problems that make it
# unsafe to copy to a VPS as-is:
#   - it publishes the API on :4000 straight to the internet, with no proxy,
#   - it has no frontend service, so the app's /api/* calls have nowhere to go,
#   - it has no Redis, so rate-limit counters stay per-process.
#
# Kept only so an existing deployment that references it does not break. New
# environments should use docker-compose.staging.yml, which runs Postgres,
# Redis, the API, the SSR frontend and Caddy behind one origin.
#
# Usage on the VPS:
#   cp apps/api/.env.example .env.prod   # fill in real secrets
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-erp_prod}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp} -d ${POSTGRES_DB:-erp_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-erp_prod}?schema=public
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required, e.g. https://your-app.vercel.app}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_ACCESS_EXPIRES_IN_SECONDS: ${JWT_ACCESS_EXPIRES_IN_SECONDS:-900}
      REFRESH_TOKEN_EXPIRES_IN_DAYS: ${REFRESH_TOKEN_EXPIRES_IN_DAYS:-30}
    ports:
      - "4000:4000"

volumes:
  postgres_prod_data:
