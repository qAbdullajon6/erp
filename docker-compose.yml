# Local PostgreSQL only — for apps/api development. Does not containerize
# the frontend or the API itself; see docs/BACKEND_FOUNDATION.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
