# Local PostgreSQL only — for apps/api development. Does not containerize
# the frontend or the API itself; see docs/BACKEND_FOUNDATION.md.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp_dev
    ports:
      # Host-side port is 5433, not 5432: some developer machines already run
      # a native PostgreSQL install on the default 5432, which silently wins
      # the port and causes Prisma to authenticate against the wrong server.
      # The container's internal port is still the Postgres default (5432).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
